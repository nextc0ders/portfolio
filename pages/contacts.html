<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Контакты</title>
	<meta name="title" content="Alberts Portfolio" />
	<meta
		name="description"
		content="Build or customize your portfolio website using this super easy template. Free to use if you are a member of the community or a contributor to this project"
	/>

	<!-- Link -->
	<link rel="icon" type="image/png" href="../assets/favicon/favicon-96x96.png" sizes="96x96" />
	<link rel="icon" type="image/svg+xml" href="../assets/favicon/favicon.svg" />
	<link rel="shortcut icon" href="../assets/favicon/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon/apple-touch-icon.png" />
	<meta name="apple-mobile-web-app-title" content="Alberts Portfolio" />
	<link rel="manifest" href="../assets/favicon/site.webmanifest" />
	<link
		rel="stylesheet"
		href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
		integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm"
		crossorigin="anonymous"
	/>
	<link rel="stylesheet" href="../css/style.css" />
	<link rel="stylesheet" href="../css/utilities.css" />
	<link rel="stylesheet" href="/pages/contacts.css">
</head>
<body>
	<header id="hero">
		<!-- Navbar -->
		<nav class="navbar">
			<div class="container">
				<!-- Logo -->
				<h1 id="logo">
					<a href="/"
						><img src="../assets/logo.svg" alt="Your Logo"
					/></a>
				</h1>
				<!-- Navbar links -->
				<ul class="nav-menu">
					<li><a class="nav-link" href="/#projects">ПРОЕКТЫ</a></li>
					<li><a class="nav-link" href="/pages/contacts.html">КОНТАКТЫ</a></li>
					<li><a class="nav-link" href="/pages/blog.html">БЛОГ</a></li>
					<li>
						<a
							class="nav-link btn btn-primary"
							href="/"
							>РЕЗЮМЕ <i class="fas fa-arrow-right"></i
						></a>
					</li>

					<!-- Toggle switch -->
					<div class="theme-switch">
						<input type="checkbox" id="switch" />
						<label class="toggle-icons" for="switch">
							<img class="moon" src="../assets/moon.svg" />
							<img class="sun" src="../assets/sun.svg" />
						</label>
					</div>
					<!-- Hamburger menu -->
				</ul>
				<div class="hamburger">
					<span class="bar"></span>
					<span class="bar"></span>
					<span class="bar"></span>
				</div>
			</div>
		</nav>

		<section class="header-container">
			<h1>Мои контакты</h1>
		</section>
	</header>

	<section id="contact" class="contact-section">
		<div class="container contact-grid">
			<div class="contact-info">
				<h2>Свяжитесь со мной</h2>
				<p>Буду рад сотрудничеству и новым проектам. Напишите сообщение — отвечу в ближайшее время.</p>
				<ul class="contact-list">
					<li><i class="fas fa-envelope"></i> <a href="mailto:example@gmail.com">example@gmail.com</a></li>
					<li><i class="fab fa-github"></i> <a href="https://github.com/418ert" target="_blank">github.com/418ert</a></li>
				</ul>
			</div>

			<form class="contact-form" action="mailto:example@gmail.com" method="post" enctype="text/plain">
				<div class="form-row">
					<input type="text" name="name" placeholder="Ваше имя" required />
					<input type="email" name="email" placeholder="Email" required />
				</div>
				<textarea name="message" rows="6" placeholder="Сообщение" required></textarea>
				<button class="btn btn-primary" type="submit">Отправить</button>
			</form>
		</div>
	</section>

	<footer id="footer">
		<div class="container">
			<a href="mailto:example@gmail.com">example@gmail.com</a>
			<!-- Social links -->
			<div class="social">
				<a href="https://github.com/418ert" target="_blank"><img src="../assets/github-icon.svg" alt="GitHub" /></a>
			</div>
			<p>&copy; Альберт <span id="datee"></span>, Все права защищены</p>
		</div>
	</footer>
	<script src="../js/script.js"></script>
</body>
</html>
